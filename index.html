<!DOCTYPE html>
<!-- DOCTYPE: Tarayıcıya bu dosyanın bir HTML5 belgesi olduğunu söyler -->
<html lang="tr">
<head>
    <!-- meta charset: Türkçe karakterlerin (ı, ğ, ş, ç vb.) doğru görünmesini sağlar -->
    <meta charset="UTF-8">
    <!-- viewport: Sayfanın mobil cihazlarda da düzgün boyutlanmasını sağlar -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- title: Tarayıcı sekmesinde görünen başlık -->
    <title>TODO List</title>
    <!-- link: style.css dosyasını bu sayfaya bağlar -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- .card: Sayfanın ortasındaki ana pencere/kutu. İçindeki her şey bunun içinde olacak -->
    <div class="card">

        <!-- card-header: Üst başlık bölümü, diğer bölümlerden farklı bir arka plan rengiyle ayrılacak -->
        <header class="card-header">
            <h1>TODO List</h1>
            <p>Görevlerini ekle, önceliklendir ve takip et. Her şey tarayıcında saklanır, sayfayı yenilesen bile kaybolmaz.</p>
        </header>

        <!-- add-task: Yeni görev eklemek için kullanılan alan. 2 sütundan oluşuyor:
             solda görev yazma kutusu (2 satır yüksekliğinde),
             sağda üst üste 2 satır: öncelik butonları + Ekle butonu -->
        <section class="add-task">
            <!-- Görev metninin yazılacağı kutu -> artık textarea, 2 satır yazılabiliyor.
                 "rows" başlangıç yüksekliğini belirtir; gerçek yükseklik flex ile
                 sağdaki 2 satırlık sütunla aynı oluyor. "resize: none" ile köşeden
                 sürükleyip boyut değiştirme kapatıldı -->
            <textarea id="todo-input" rows="2" placeholder="Yeni görev ekle..."></textarea>

            <!-- add-task-right: sağ sütun, üst üste 2 satır içeriyor -->
            <div class="add-task-right">
                <!-- priority-options: öncelik seçimi artık radio button ile yapılıyor
                     ama radio'lar görünmez, yanlarındaki label'lar buton gibi stillendi.
                     "checked" olan radio'nun label'ı CSS ile renkli gösteriliyor -->
                <div class="priority-options">
                    <!-- Etiketlerin içine yazı yerine, görev satırlarındaki öncelik
                         oklarıyla aynı semboller kondu: ▲ yüksek, ● normal, ▼ düşük -->
                    <input type="radio" name="priority" id="priority-high" value="high">
                    <label for="priority-high" class="priority-option priority-option-high">▲</label>

                    <input type="radio" name="priority" id="priority-normal" value="normal" checked>
                    <label for="priority-normal" class="priority-option priority-option-normal">●</label>

                    <input type="radio" name="priority" id="priority-low" value="low">
                    <label for="priority-low" class="priority-option priority-option-low">▼</label>
                </div>

                <!-- Görevi listeye eklemek için tıklanacak buton -->
                <button id="add-btn">Ekle</button>
            </div>
        </section>

        <!-- filters: Görevleri filtrelemek (Tümü/Aktif/Tamamlanan) ve tamamlananları silmek için bölüm -->
        <div class="filters">
            <!-- filter-buttons: Solda yer alacak 3 filtre butonu -->
            <!-- data-filter: JS'e "bu butona tıklanınca hangi filtre uygulanacak" bilgisini taşıyan özel etiket -->
            <div class="filter-buttons">
                <button class="filter-btn active" data-filter="all">Tümü</button>
                <button class="filter-btn" data-filter="active">Aktif</button>
                <button class="filter-btn" data-filter="completed">Tamamlanan</button>
            </div>
            <!-- Sağda yer alacak, tamamlanmış görevleri listeden kaldıracak buton -->
            <button id="clear-completed-btn">Tamamlananları Sil</button>
        </div>

        <!-- stats: Toplam / Aktif / Tamamlanan görev sayılarını gösteren 3 kutu -->
        <!-- Şimdilik sayılar sabit (0) yazıyor, ileride JS bu sayıları güncelleyecek -->
        <div class="stats">
            <div class="stat-box">
                <!-- id'ler sayesinde script.js bu sayıları güncelleyebiliyor -->
                <span class="stat-number" id="total-count">0</span>
                <span class="stat-label">Toplam</span>
            </div>
            <div class="stat-box">
                <span class="stat-number" id="active-count">0</span>
                <span class="stat-label">Aktif</span>
            </div>
            <div class="stat-box">
                <span class="stat-number" id="completed-count">0</span>
                <span class="stat-label">Tamamlanan</span>
            </div>
        </div>

        <!-- task-list: Görevlerin listeleneceği alan.
             2. adımdan itibaren görevler buraya script.js tarafından,
             öncelik sırasına göre (yüksek -> normal -> düşük) ekleniyor -->
        <ul class="task-list"></ul>

    </div>

    <!-- script.js: İşlevsellik (görev ekleme, silme vb.) sonraki adımlarda buraya yazılacak -->
    <script src="script.js"></script>
</body>
</html>
