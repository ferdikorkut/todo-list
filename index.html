<!DOCTYPE html>
<!-- DOCTYPE: Tarayıcıya bu dosyanın bir HTML5 belgesi olduğunu söyler -->
<html lang="tr">
<head>
    <!-- meta charset: Türkçe karakterlerin (ı, ğ, ş, ç vb.) doğru görünmesini sağlar -->
    <meta charset="UTF-8">
    <!-- viewport: Sayfanın mobil cihazlarda da düzgün boyutlanmasını sağlar -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- title: Tarayıcı sekmesinde görünen başlık -->
    <title>TODO List</title>
    <!-- link: style.css dosyasını bu sayfaya bağlar -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- .card: Sayfanın ortasındaki ana pencere/kutu. İçindeki her şey bunun içinde olacak -->
    <div class="card">

        <!-- card-header: Üst başlık bölümü, diğer bölümlerden farklı bir arka plan rengiyle ayrılacak -->
        <header class="card-header">
            <h1>TODO List</h1>
            <p>Görevlerini ekle, önceliklendir ve takip et. Her şey tarayıcında saklanır, sayfayı yenilesen bile kaybolmaz.</p>
        </header>

        <!-- add-task: Yeni görev eklemek için kullanılan alan -->
        <section class="add-task">
            <!-- Görev metninin yazılacağı kutu -->
            <input type="text" id="todo-input" placeholder="Yeni görev ekle...">

            <!-- select: Açılır liste. Kullanıcı görevin önem derecesini buradan seçecek -->
            <!-- value: JS tarafında bu değeri okuyacağız, "selected" olan başlangıçta seçili gelir -->
            <select id="priority-select">
                <option value="high">Yüksek</option>
                <option value="normal" selected>Normal</option>
                <option value="low">Düşük</option>
            </select>

            <!-- Görevi listeye eklemek için tıklanacak buton -->
            <button id="add-btn">Ekle</button>
        </section>

        <!-- filters: Görevleri filtrelemek (Tümü/Aktif/Tamamlanan) ve tamamlananları silmek için bölüm -->
        <div class="filters">
            <!-- filter-buttons: Solda yer alacak 3 filtre butonu -->
            <!-- data-filter: JS'e "bu butona tıklanınca hangi filtre uygulanacak" bilgisini taşıyan özel etiket -->
            <div class="filter-buttons">
                <button class="filter-btn active" data-filter="all">Tümü</button>
                <button class="filter-btn" data-filter="active">Aktif</button>
                <button class="filter-btn" data-filter="completed">Tamamlanan</button>
            </div>
            <!-- Sağda yer alacak, tamamlanmış görevleri listeden kaldıracak buton -->
            <button id="clear-completed-btn">Tamamlananları Sil</button>
        </div>

        <!-- stats: Toplam / Aktif / Tamamlanan görev sayılarını gösteren 3 kutu -->
        <!-- Şimdilik sayılar sabit (0) yazıyor, ileride JS bu sayıları güncelleyecek -->
        <div class="stats">
            <div class="stat-box">
                <span class="stat-number">0</span>
                <span class="stat-label">Toplam</span>
            </div>
            <div class="stat-box">
                <span class="stat-number">0</span>
                <span class="stat-label">Aktif</span>
            </div>
            <div class="stat-box">
                <span class="stat-number">0</span>
                <span class="stat-label">Tamamlanan</span>
            </div>
        </div>

        <!-- task-list: Görevlerin listeleneceği alan -->
        <!-- Aşağıdaki 3 görev SADECE TASARIMI GÖRMEK İÇİN örnek olarak yazıldı. -->
        <!-- Bir sonraki adımda bunları kaldırıp, görevleri JS ile dinamik olarak ekleyeceğiz. -->
        <ul class="task-list">

            <!-- Yüksek öncelikli, tamamlanmamış bir görev örneği -->
            <li class="task-item priority-high">
                <!-- check-btn: Tamamlandı işaretlemek için tıklanacak yuvarlak buton -->
                <button class="check-btn"></button>
                <span class="task-text">Önemli bir iş (yüksek öncelik)</span>
                <div class="task-actions">
                    <!-- ▲▼: Önceliği yukarı/aşağı taşımak için butonlar -->
                    <button class="priority-btn">▲</button>
                    <button class="priority-btn">▼</button>
                    <button class="edit-btn">Düzenle</button>
                    <button class="delete-btn">Sil</button>
                </div>
            </li>

            <!-- Normal öncelikli, tamamlanmamış bir görev örneği -->
            <li class="task-item priority-normal">
                <button class="check-btn"></button>
                <span class="task-text">Normal öncelikli görev</span>
                <div class="task-actions">
                    <button class="priority-btn">▲</button>
                    <button class="priority-btn">▼</button>
                    <button class="edit-btn">Düzenle</button>
                    <button class="delete-btn">Sil</button>
                </div>
            </li>

            <!-- Düşük öncelikli, TAMAMLANMIŞ bir görev örneği -->
            <!-- "completed" class'ı sayesinde yazı üstü çizili görünecek -->
            <li class="task-item priority-low completed">
                <!-- "checked" class'ı sayesinde yuvarlak buton dolu/tikli görünecek -->
                <button class="check-btn checked">✓</button>
                <span class="task-text">Tamamlanmış düşük öncelikli görev</span>
                <div class="task-actions">
                    <button class="priority-btn">▲</button>
                    <button class="priority-btn">▼</button>
                    <button class="edit-btn">Düzenle</button>
                    <button class="delete-btn">Sil</button>
                </div>
            </li>

        </ul>

    </div>

    <!-- script.js: İşlevsellik (görev ekleme, silme vb.) sonraki adımlarda buraya yazılacak -->
    <script src="script.js"></script>
</body>
</html>
